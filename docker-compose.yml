services:
  mysql:
    image: mysql:8.0
    container_name: pissir-mysql2
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pissir_db
      MYSQL_USER: pissir_user
      MYSQL_PASSWORD: pissir_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server-rest/src/main/resources/init_mysql.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - pissir-network

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: pissir-mosquitto2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto_password.txt:/mosquitto/config/password.txt
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - pissir-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: pissir-keycloak2
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql:3306/keycloak_db
      KC_DB_USERNAME: pissir_user
      KC_DB_PASSWORD: pissir_password
    command: start-dev
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - pissir-network

volumes:
  mysql_data:
  mosquitto_data:
  mosquitto_log:

networks:
  pissir-network:
    driver: bridge
